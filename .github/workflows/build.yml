name: Build and commit artifacts

on:
    push:
        branches: [main]

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - name: Use Node.js 22.x
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: "npm"
            - run: npm ci
            - run: npm run build
            - run: npm run lint
            - name: Commit build artifacts
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add -f main.js styles.css manifest.json
                  git diff --staged --quiet && echo "No changes to commit" || git commit -m "Build artifacts for $(git rev-parse --short HEAD)"
                  git push
